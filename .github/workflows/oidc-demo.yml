name: OIDC Demo

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  inspect-oidc-token:
    runs-on: ubuntu-latest

    steps:
      - name: Request OIDC Token
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")

          echo "OIDC response received"

          echo "$RESPONSE" | jq .
